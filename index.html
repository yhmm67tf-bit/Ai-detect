<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Person Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            z-index: 10;
        }
        #status {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffeb3b;
            text-align: center;
        }
        .btn {
            margin-top: 15px;
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #00e676;
            color: black;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,230,118,0.3);
        }
        .btn:disabled {
            background-color: #555;
            color: #aaa;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h2 style="margin: 0 0 10px 0;">ระบบตรวจจับบุคคล</h2>
    
    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div id="status">กำลังโหลดระบบ AI... กรุณารอสักครู่</div>
    <button id="startBtn" class="btn" disabled>เริ่มเปิดกล้อง</button>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        
        let model = undefined;
        let audioCtx = null;
        let isDetecting = false;

        // 1. โหลดโมเดล AI (COCO-SSD)
        statusText.innerText = "กำลังโหลดโมเดล AI (COCO-SSD)...";
        cocoSsd.load().then(loadedModel => {
            model = loadedModel;
            statusText.innerText = "โมเดลพร้อมใช้งาน! กดปุ่มเพื่อเริ่ม";
            startBtn.disabled = false;
        }).catch(err => {
            statusText.innerText = "เกิดข้อผิดพลาดในการโหลดโมเดล: " + err.message;
        });

        // 2. ฟังก์ชันเริ่มเปิดกล้อง (รองรับกล้องหลังของมือถือ)
        async function setupCamera() {
            const constraints = {
                video: {
                    facingMode: "environment", // ใช้กล้องหลัง (ถ้าจะใช้กล้องหน้าเปลี่ยนเป็น "user")
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        resolve(video);
                    };
                });
            } catch (err) {
                alert("ไม่สามารถเข้าถึงกล้องได้: " + err.message);
            }
        }

        // 3. ฟังก์ชันสร้างเสียงแจ้งเตือน (Beep) โดยไม่ต้องใช้ไฟล์เสียงภายนอก
        function playBeep() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; // เสียงบี๊บแบบนุ่มนวล
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // ความถี่เสียง (Hz)
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); // ความดัง
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); // ค่อยๆ ดับลงใน 0.1 วินาที
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

            if (!isDetecting) return;
